<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Topology Map - Vanilla JS Example</title>
  <link rel="stylesheet" href="/vendor/gufo-font/gufo-font.css" />
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: #0f172a;
      background: #f8fafc;
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      padding: 12px;
      background: #ffffff;
      border-bottom: 1px solid #cbd5e1;
    }

    .toolbar button,
    .toolbar label {
      font-size: 14px;
    }

    .toolbar input[type="range"] {
      width: 120px;
      vertical-align: middle;
    }

    .toolbar button {
      border: 1px solid #94a3b8;
      background: #ffffff;
      color: #0f172a;
      padding: 6px 10px;
      border-radius: 6px;
      cursor: pointer;
    }

    .toolbar button:hover {
      background: #eff6ff;
    }

    .toolbar .stats {
      margin-left: auto;
      align-self: center;
      font-size: 13px;
      color: #334155;
      white-space: nowrap;
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(360px, 1fr) 280px;
      height: calc(100vh - 58px);
    }

    .layout > div {
      min-width: 0;
      min-height: 0;
      overflow: hidden;
    }

    #topology-main {
      min-width: 0;
      border-right: 1px solid #cbd5e1;
    }

    #topology-minimap {
      min-width: 0;
      background: #ffffff;
    }

    @media (max-width: 900px) {
      .layout {
        grid-template-columns: 1fr;
        grid-template-rows: 1fr 220px;
      }

      #topology-main {
        border-right: 0;
        border-bottom: 1px solid #cbd5e1;
      }
    }
  </style>
</head>

<body>
  <div class="toolbar">
    <button id="mode-pan" type="button">Pan</button>
    <button id="mode-zoom-area" type="button">Zoom To Area</button>
    <button id="mode-edit" type="button">Edit</button>
    <button id="zoom-in" type="button">+</button>
    <button id="zoom-out" type="button">-</button>
    <button id="reset-view" type="button">Reset</button>
    <label><input id="snap-toggle" type="checkbox" checked /> Snap to grid</label>
    <label><input id="guides-toggle" type="checkbox" checked /> Guides</label>
    <label>
      Padding
      <input id="bounds-padding" type="range" min="0" max="48" step="1" value="12" />
      <span id="bounds-padding-value">12</span>px
    </label>
    <span id="render-stats" class="stats">Visible E: 0 L: 0 | Total E: 0 L: 0</span>
  </div>
  <div class="layout">
    <div id="topology-main"></div>
    <div id="topology-minimap"></div>
  </div>

  <script type="importmap">
      {
        "imports": {
          "@joint/core": "/vendor/joint-core/joint.mjs",
          "rbush": "/vendor/rbush/index.js",
          "quickselect": "/vendor/quickselect/index.js"
        }
      }
    </script>
  <script>
      (function () {
        if (window.location.search.includes('noreload=1')) {
          return;
        }

        let marker = '';

        async function checkReload() {
          try {
            const response = await fetch(`/__reload.txt?ts=${Date.now()}`, { cache: 'no-store' });
            if (!response.ok) {
              return;
            }

            const nextMarker = await response.text();
            if (marker && marker !== nextMarker) {
              window.location.reload();
              return;
            }
            marker = nextMarker;
          } catch {
            // ignore temporary network errors while restarting nginx/watch
          }
        }

        setInterval(checkReload, 1200);
        checkReload();
      })();
    </script>
  <script type="module" src="/examples/vanilla-launch.js"></script>
</body>

</html>
