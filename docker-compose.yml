services:
  dev:
    build: .
    command: pnpm demo
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - /app/node_modules
    restart: unless-stopped

  build:
    build: .
    command: pnpm build
    volumes:
      - .:/app
      - /app/node_modules
    restart: "no"

  test:
    build: .
    command: pnpm test
    volumes:
      - .:/app
      - /app/node_modules
    restart: "no"

  typecheck:
    build: .
    command: pnpm typecheck
    volumes:
      - .:/app
      - /app/node_modules
    restart: "no"

  nginx:
    image: nginx
    container_name: topo_demo
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./dist/demo:/usr/share/nginx/html:ro
    restart: unless-stopped
